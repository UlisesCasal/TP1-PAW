<body>
    <header>
        <!--el tag "a" es un enlace para navegar hacia otra pagina, mientras que el tag "button" ejecuta una accion dentro de la misma-->
        <a href="index.html"> <!--href hace referencia a donde va el enlace, en este caso a la pagina principal, si es que se llama index.html-->
            <img src="logo.png">
            <!-- src indica de donde viene el recurso, es decir, la imagen en si-->
            <!--alt es la alternativa a la imagen, si esta no carga aparece esa foto-->
        </a>
        <a href="carrito.html">
            Carrito<!--Nombre del boton: "Carrito"-->
        </a>
        <form action="busqueda.PHP" method="get"><!--el tag "form" indica que es un formulario-->

        </form> 
        <a href="crear-cuenta.html">
            Registrarse <!--Nombre del boton: "Registrarse"-->
        </a>

        <h1>Iniciar sesión</h1>
        <form action="inicio-sesion.PHP" method="post" >

                <legend>Datos personales:</legend>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="ej.:tuemail@email.com" required>
                <label for="contra">Contraseña</label>
                <input type="password" name="password" id="contra" placeholder="ej.:tucontraseña" required>
            </fieldset>    
            <button type="submit">Iniciar sesión</button>
        </form>
